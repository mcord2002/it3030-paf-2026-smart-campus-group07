spring.application.name=campus-hub-api

# MySQL (override via env for CI/docker)
spring.datasource.url=jdbc:mysql://localhost:3306/PAF
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT (set CAMPUS_HUB_JWT_SECRET in production)
campus-hub.jwt.secret=${CAMPUS_HUB_JWT_SECRET:change-this-secret-key-min-32-chars-long!!}
campus-hub.jwt.expiration-ms=${CAMPUS_HUB_JWT_EXPIRATION_MS:86400000}

# File uploads (ticket evidence)
campus-hub.upload.dir=${CAMPUS_HUB_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

server.port=8080
