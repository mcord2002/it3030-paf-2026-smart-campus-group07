spring.application.name=campus-hub-api

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/PAF
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
campus-hub.jwt.secret=change-this-secret-key-min-32-chars-long!!
campus-hub.jwt.expiration-ms=86400000

# ===============================
# GOOGLE OAUTH2 LOGIN
# ===============================
spring.security.oauth2.client.registration.google.client-id=368727099979-nh3qhmrhrsn2m4ln6nma6bnl2h28j1td.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ===============================
# CUSTOM CLIENT ID (optional)
# ===============================
campus-hub.oauth.google.client-id=368727099979-nh3qhmrhrsn2m4ln6nma6bnl2h28j1td.apps.googleusercontent.com

# ===============================
# FILE UPLOADS
# ===============================
campus-hub.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB


