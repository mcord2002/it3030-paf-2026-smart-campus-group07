spring.datasource.url=jdbc:h2:mem:campushub;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

campus-hub.jwt.secret=test-secret-key-must-be-long-enough-for-hs256!!
campus-hub.jwt.expiration-ms=3600000
campus-hub.upload.dir=${java.io.tmpdir}/campus-hub-test-uploads
